[colors]
background = #1a1b26
background-alt = #24283b
foreground = #c0caf5
blue = #7aa2f7
green = #9ece6a

[bar/main]
width = 100%
height = 26
background = ${colors.background}
foreground = ${colors.foreground}
enable-ipc = true
enable-click = true
enable-scroll = true
font-0 = JetBrainsMono Nerd Font:size=10
font-1 = FontAwesome:size=10
padding-left = 1
padding-right = 1
module-margin = 1
modules-left = i3
modules-center = date
modules-right = voxtype audio xkeyboard wifi bluetooth vpn powerprofile battery drive

[module/voxtype]
type = custom/script
interval = 1
exec = ~/.config/polybar/scripts/voxtype.sh
format-foreground = ${colors.foreground}
click-left = voxtype record cancel >/dev/null 2>&1 &

[module/audio]
type = custom/script
interval = 1
exec = ~/.config/polybar/scripts/volume.sh
click-left = pamixer -t
scroll-up = pamixer -i 5
scroll-down = pamixer -d 5

[module/i3]
type = internal/i3
format = <label-state>
index-sort = true
pin-workspaces = true
label-focused = %index%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.background-alt}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 1
label-visible = %index%
label-visible-foreground = ${colors.foreground}
label-visible-padding = 1
label-urgent = %index%!
label-urgent-padding = 1
label-separator = " "

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.blue}
label-indicator-padding = 1
label-indicator-background = ${colors.background-alt}

[module/wifi]
type = internal/network
interface = ${env:POLYBAR_WLAN:wlp6s0}
interface-type = wireless
interval = 3
format-connected = %{A1:nm-connection-editor &:}%{A3:~/.config/polybar/scripts/open-nmtui.sh &:}<ramp-signal>%{A}%{A}
ramp-signal-0 = ▁▁▁▁
ramp-signal-1 = ▂▁▁▁
ramp-signal-2 = ▂▄▁▁
ramp-signal-3 = ▂▄▆▁
ramp-signal-4 = ▂▄▆█
ramp-signal-0-foreground = #f7768e
ramp-signal-1-foreground = #f7768e
ramp-signal-2-foreground = #e0af68
ramp-signal-3-foreground = #9ece6a
ramp-signal-4-foreground = #7aa2f7
format-disconnected = %{A1:nm-connection-editor &:}%{A3:~/.config/polybar/scripts/open-nmtui.sh &:}<label-disconnected>%{A}%{A}
label-disconnected = ▁▁▁▁
label-disconnected-foreground = #7a83a8

[module/bluetooth]
type = custom/script
interval = 5
exec = sh -c "bluetoothctl devices Connected 2>/dev/null | grep -q . && echo '%{T2}%{F#7aa2f7}%{F-}%{T-}' || echo '%{T2}%{F#7a83a8}%{F-}%{T-}'"
click-left = blueman-manager

[module/vpn]
type = custom/script
interval = 5
exec = ~/.config/polybar/scripts/protonvpn.sh status
label-foreground = ${colors.foreground}
format-foreground = ${colors.foreground}
click-left = ~/.config/polybar/scripts/protonvpn.sh toggle >/dev/null 2>&1 &

[module/powerprofile]
type = custom/script
interval = 5
exec = ~/.config/polybar/scripts/power-profile.sh
click-left = ~/.config/polybar/scripts/power-profile.sh next >/dev/null 2>&1

[module/battery]
type = custom/script
interval = 15
exec = ~/.config/polybar/scripts/battery.sh
click-left = ~/.config/polybar/scripts/battery.sh notify >/dev/null 2>&1

[module/drive]
type = custom/text
content = Drive
content-foreground = ${colors.foreground}
click-left = gtk-launch synology-drive

[module/date]
type = internal/date
interval = 5
date = %H:%M
